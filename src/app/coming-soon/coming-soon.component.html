<div class="cs-shell">
  <div class="cs-card">

    <div class="cs-icon-ring">
      <i [class]="pageIcon"></i>
    </div>

    <h2 class="cs-title">{{ pageName }}</h2>
    <p class="cs-subtitle">Page Coming Soon!</p>
    <p class="cs-desc">
      This section is currently under development.<br>
      We're working hard to bring it to you shortly.
    </p>

    <div class="cs-badge">
      <i class="fas fa-hammer"></i>
      In Development
    </div>

  </div>
</div>
